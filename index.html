<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Plate Tectonics Simulation</title>
    <script src="https://cjrtnc.leaningtech.com/4.2/loader.js"></script>
  </head>
  <body>
    <div id="simulation-container"></div>
    <script>
      (async () => {
        // Initialize CheerpJ
        await cheerpjInit();
        
        // Use the direct URL to your JAR file on GitHub Pages
        // This is much more reliable and avoids the "Deprecated" warning
        await cheerpjRunMain(
            "edu.colorado.phet.platetectonics.PlateTectonicsApplication", 
            "/plate-tectonics_en.jar"
        );
      })();
    </script>
  </body>
</html>
