<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Plate Tectonics Simulation</title>
    <script src="https://cjrtnc.leaningtech.com/4.2/loader.js"></script>
  </head>
  <body>
    <div id="simulation-container"></div>
    <script>
      (async () => {
        // Initialize the CheerpJ runtime
        await cheerpjInit();
        
        // Launch the simulation
        // Note: The path /app/ is the virtual root for your uploaded JAR
        await cheerpjRunMain(
            "edu.colorado.phet.platetectonics.PlateTectonicsApplication", 
            "/app/plate-tectonics_en.jar"
        );
      })();
    </script>
  </body>
</html>
