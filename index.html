<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Plate Tectonics Simulation</title>
    <script src="https://cjrtnc.leaningtech.com/4.2/loader.js"></script>
  </head>
  <body>
    <div id="simulation-container"></div>
   <script>
  (async () => {
    // 1. Initialize CheerpJ
    await cheerpjInit();

    // 2. Explicitly tell CheerpJ where to find the JAR
    // This ensures the file is loaded into the virtual /app/ directory
    await cheerpjAddStringFile("plate-tectonics_en.jar", await (await fetch("plate-tectonics_en.jar")).arrayBuffer());

    // 3. Launch the application
    await cheerpjRunMain("edu.colorado.phet.platetectonics.PlateTectonicsApplication", "/app/plate-tectonics_en.jar");
  })();
</script>
  </body>
</html>
